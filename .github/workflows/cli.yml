name: CLI

on:
  workflow_dispatch:
    inputs:
      command:
        description: "CLI command to run"
        required: true
        type: choice
        options:
          - stats
          - db stats
          - db seed
          - programs list
          - applications list
          - profile
      args:
        description: "Extra arguments (e.g. --area NLP --limit 10)"
        required: false
        default: ""

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run CLI command
        run: npx tsx cli/index.ts ${{ github.event.inputs.command }} ${{ github.event.inputs.args }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
